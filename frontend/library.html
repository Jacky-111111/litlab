<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LitLab | Paper Library</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/?size=100&id=aOIjONBdomrC&format=png&color=000000" />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script defer src="app.js"></script>
    <script defer src="library.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <a class="brand" href="dashboard.html">LitLab</a>
        <a class="button secondary" href="dashboard.html">Back to Dashboard</a>
      </div>
    </header>

    <main class="container section project-layout">
      <section class="panel">
        <h1>Paper Library</h1>
        <p class="muted">Browse all papers, filter by collection, and manage each paper's collection membership in one place.</p>
        <p id="library-message" class="message info">Loading your papers...</p>
      </section>

      <section class="panel library-toolbar">
        <form id="library-search-form" class="library-search-form">
          <label class="library-search-label" for="library-search-input">Research Search</label>
          <div class="library-search-row">
            <input
              id="library-search-input"
              name="query"
              type="text"
              placeholder="Search by paper title or nickname"
              autocomplete="off"
            />
            <button id="clear-search-btn" type="button" class="secondary">Clear</button>
            <button type="submit">Search</button>
          </div>
        </form>
      </section>

      <section class="library-workspace">
        <aside class="panel library-sidebar">
          <h2>View</h2>
          <p class="muted">Choose all papers or a specific collection.</p>
          <div id="library-filter-menu" class="library-filter-menu"></div>
        </aside>

        <section class="panel library-results-panel">
          <div class="library-results-head">
            <h2 id="library-results-title">All Papers</h2>
            <p id="library-results-meta" class="muted"></p>
          </div>
          <div id="library-papers" class="stack"></div>
        </section>
      </section>
    </main>
  </body>
</html>
