<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LitLab | Project</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script defer src="app.js"></script>
    <script defer src="project.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <a class="brand" href="dashboard.html">LitLab</a>
        <a class="button secondary" href="dashboard.html">Back to Dashboard</a>
      </div>
    </header>

    <main class="container section project-layout">
      <p id="project-message" class="message info">Preparing project view...</p>

      <section class="panel">
        <h1 id="project-title">Project</h1>
        <p id="project-description" class="muted">Description</p>
      </section>

      <section class="two-col">
        <article class="panel">
          <h2>Framework Guidance</h2>
          <div id="framework-guide"></div>
          <h3>Your section notes/checklists</h3>
          <form id="framework-notes-form"></form>
        </article>

        <article class="panel">
          <h2>Saved Papers</h2>
          <div id="saved-papers" class="stack"></div>
        </article>
      </section>

      <section class="two-col">
        <article class="panel">
          <h2>Search Papers</h2>
          <form id="search-form">
            <label>
              Keyword query
              <input type="text" name="query" placeholder="e.g., machine learning fairness education" />
            </label>
            <button type="submit">Search</button>
          </form>
          <div id="search-results" class="stack"></div>
        </article>

        <article class="panel">
          <h2>AI Paper Analysis</h2>
          <p class="muted">Select a saved paper, then run an action.</p>
          <div class="inline-actions">
            <button id="btn-summarize" type="button">Summarize</button>
            <button id="btn-explain" type="button" class="secondary">Explain for Beginner</button>
            <button id="btn-quiz" type="button" class="secondary">Generate Quiz</button>
            <button id="btn-recommend" type="button" class="secondary">Related Papers</button>
          </div>
          <pre id="ai-output" class="ai-output"></pre>
          <div id="related-papers" class="stack"></div>
        </article>
      </section>
    </main>
  </body>
</html>
